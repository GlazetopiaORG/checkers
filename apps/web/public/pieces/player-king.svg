<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="D'Lish King">
  <!-- D'Lish promoted to king. Same body, with crown + gold ring overlay.
       Animated gold-ring pulse is added via CSS in PieceSkin.tsx. -->
  <defs>
    <radialGradient id="dlishk-body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff3a0"/>
      <stop offset="70%" stop-color="#f7cf3d"/>
      <stop offset="100%" stop-color="#c98a17"/>
    </radialGradient>
    <linearGradient id="dlishk-crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd86a"/>
      <stop offset="100%" stop-color="#c4951a"/>
    </linearGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#f9d251" stroke-width="3" opacity="0.85"/>
  <!-- Donut body -->
  <circle cx="50" cy="50" r="34" fill="url(#dlishk-body)" stroke="#7a4d0a" stroke-width="3"/>
  <circle cx="50" cy="50" r="10" fill="#3a2406"/>
  <!-- Sprinkles -->
  <rect x="28" y="32" width="6" height="2.5" rx="1" fill="#ff5577" transform="rotate(-20 31 33)"/>
  <rect x="62" y="34" width="6" height="2.5" rx="1" fill="#3aaaff" transform="rotate(35 65 35)"/>
  <rect x="40" y="70" width="6" height="2.5" rx="1" fill="#56cc6a" transform="rotate(10 43 71)"/>
  <rect x="64" y="60" width="6" height="2.5" rx="1" fill="#ff8a3a" transform="rotate(-30 67 61)"/>
  <!-- Eyes -->
  <circle cx="44" cy="48" r="2" fill="#1a1a1a"/>
  <circle cx="56" cy="48" r="2" fill="#1a1a1a"/>
  <!-- Crown -->
  <path d="M 30 22 L 36 32 L 42 18 L 50 30 L 58 18 L 64 32 L 70 22 L 68 36 L 32 36 Z"
        fill="url(#dlishk-crown)" stroke="#7a5510" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="50" cy="22" r="2.5" fill="#ff4d6d"/>
  <circle cx="36" cy="26" r="2" fill="#3aaaff"/>
  <circle cx="64" cy="26" r="2" fill="#56cc6a"/>
</svg>
