<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Unbaked">
  <!-- Unbaked man: hooded cloak silhouette, void-black with subtle green glow.
       Faceless on purpose — the form is the threat, not the face. -->
  <defs>
    <radialGradient id="cpu-glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#1a4d1a"/>
      <stop offset="60%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <!-- Faint green outer glow -->
  <circle cx="50" cy="55" r="40" fill="#2dff5a" opacity="0.08"/>
  <!-- Cloak body — broad shoulders narrowing to a point -->
  <path d="M 20 80 Q 22 62 30 50 Q 36 32 50 24 Q 64 32 70 50 Q 78 62 80 80 Z"
        fill="url(#cpu-glow)" stroke="#000" stroke-width="1.5"/>
  <!-- Hood opening (dark hollow) -->
  <ellipse cx="50" cy="42" rx="12" ry="14" fill="#000"/>
  <!-- Two dim red glints where eyes would be -->
  <circle cx="46" cy="42" r="1.8" fill="#ff2a3a" opacity="0.9"/>
  <circle cx="54" cy="42" r="1.8" fill="#ff2a3a" opacity="0.9"/>
  <!-- Ragged cloak hem -->
  <path d="M 20 80 L 24 85 L 28 80 L 32 86 L 38 80 L 44 84 L 50 80 L 56 84 L 62 80 L 68 86 L 72 80 L 76 85 L 80 80"
        stroke="#000" stroke-width="1.5" fill="none"/>
</svg>
