<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Unbaked True Form">
  <!-- Unbaked KING — has dropped the cloak. True form: green void slime
       with the signature swirl eyes from the lore card. -->
  <defs>
    <radialGradient id="cpuk-body" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#46d955"/>
      <stop offset="65%" stop-color="#1a7a25"/>
      <stop offset="100%" stop-color="#082d10"/>
    </radialGradient>
    <radialGradient id="cpuk-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#56ff66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#56ff66" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer green aura -->
  <circle cx="50" cy="50" r="44" fill="url(#cpuk-glow)"/>
  <!-- Drippy slime body — flame-licked silhouette -->
  <path d="M 30 78 Q 18 60 22 48 Q 18 38 26 32 Q 30 18 42 22 Q 50 12 58 22 Q 70 18 74 32 Q 82 38 78 48 Q 82 60 70 78 Q 60 84 50 80 Q 40 84 30 78 Z"
        fill="url(#cpuk-body)" stroke="#0a1a0a" stroke-width="2"/>
  <!-- Drip flames coming off -->
  <path d="M 22 48 Q 16 45 18 38" stroke="#1a7a25" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 78 48 Q 84 45 82 38" stroke="#1a7a25" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Swirl-eyes: white sclera, spiraling red iris -->
  <circle cx="40" cy="44" r="8" fill="#fff"/>
  <circle cx="60" cy="44" r="8" fill="#fff"/>
  <g stroke="#cc1f2a" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 40 44 m -4 0 a 4 4 0 1 1 4 4 a 2 2 0 1 1 -2 -2"/>
    <path d="M 60 44 m -4 0 a 4 4 0 1 1 4 4 a 2 2 0 1 1 -2 -2"/>
  </g>
  <!-- Toothy grin -->
  <path d="M 42 60 Q 50 68 58 60" stroke="#fff" stroke-width="2" fill="#1a1a1a" stroke-linejoin="round"/>
  <path d="M 44 60 L 45 64 L 46 60 L 47 64 L 48 60 L 49 64 L 50 60 L 51 64 L 52 60 L 53 64 L 54 60 L 55 64 L 56 60"
        stroke="#fff" stroke-width="1" fill="none"/>
</svg>
