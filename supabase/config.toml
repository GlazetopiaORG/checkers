# Supabase CLI configuration for Glazetopia Checkers.
# Run `supabase start` to bring up a local Postgres + Studio + Auth stack.
# Run `supabase db reset` to re-apply all migrations from scratch.

project_id = "glazetopia-checkers"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
